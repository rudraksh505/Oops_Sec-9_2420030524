<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotten Onions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827; /* Dark Gray */
        }
        /* Custom scrollbar for a better look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1F2937; /* Gray-800 */
        }
        ::-webkit-scrollbar-thumb {
            background: #4B5563; /* Gray-600 */
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6B7280; /* Gray-500 */
        }
        /* Style for the modal backdrop */
        #modal-backdrop {
            transition: opacity 0.3s ease-in-out;
        }
        /* Animation for modal content */
        #modal-content {
            transition: transform 0.3s ease-in-out;
        }
        .rating-fresh {
            color: #22c55e; /* Green-500 */
        }
        .rating-rotten {
            color: #ef4444; /* Red-500 */
        }
        .rating-mixed {
            color: #eab308; /* Yellow-500 */
        }
        .poster-img {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .poster-img:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body class="text-gray-200">

    <!-- Header Section -->
    <header class="bg-gray-900/80 backdrop-blur-sm sticky top-0 z-40 shadow-lg">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3">
                    <img src="http://googleusercontent.com/file_content/1" alt="Rotten Onions Logo" class="h-10 w-10 rounded-full">
                    <h1 class="text-2xl font-bold text-white">Rotten Onions</h1>
                </div>
                <div class="w-full max-w-xs">
                    <form id="search-form" class="relative">
                        <input type="text" id="search-input" placeholder="Search for a movie or series..." class="w-full bg-gray-800 text-white placeholder-gray-400 border border-gray-700 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent transition">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </form>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <h2 id="main-title" class="text-3xl font-bold mb-6 text-white">Popular Movies</h2>
        <div id="loader" class="text-center hidden">
             <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-red-600 mx-auto"></div>
             <p class="mt-2">Loading...</p>
        </div>
        <div id="movies-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            <!-- Movie posters will be injected here -->
        </div>
        <p id="error-message" class="text-center text-xl text-gray-400 hidden"></p>
    </main>

    <!-- Movie Details Modal -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <!-- Backdrop -->
        <div id="modal-backdrop" class="absolute inset-0 bg-black bg-opacity-75"></div>
        
        <!-- Modal Content -->
        <div id="modal-content" class="relative bg-gray-800 rounded-lg shadow-xl w-11/12 max-w-4xl max-h-[90vh] overflow-y-auto transform scale-95">
            <!-- Close Button -->
            <button id="modal-close" class="absolute top-3 right-3 text-gray-400 hover:text-white z-10">
                <svg class="h-8 w-8" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <div id="modal-body" class="p-0">
                <!-- Movie details will be injected here -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- CONFIGURATION ---
            // This is your TMDb API Key.
            const API_KEY = 'd63d4bcc8e67ae62c917bb48aba3ec58'; 
            const API_BASE_URL = 'https://api.themoviedb.org/3';
            const IMAGE_BASE_URL = 'https://image.tmdb.org/t/p/w500';
            const PLACEHOLDER_IMAGE = 'https://placehold.co/500x750/1f2937/6b7280?text=No+Image';

            // --- DOM ELEMENTS ---
            const searchForm = document.getElementById('search-form');
            const searchInput = document.getElementById('search-input');
            const moviesGrid = document.getElementById('movies-grid');
            const mainTitle = document.getElementById('main-title');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('error-message');

            const modal = document.getElementById('modal');
            const modalBackdrop = document.getElementById('modal-backdrop');
            const modalContent = document.getElementById('modal-content');
            const modalBody = document.getElementById('modal-body');
            const modalClose = document.getElementById('modal-close');

            // --- API FUNCTIONS ---

            /**
             * Fetches data from TMDb API with error handling.
             * @param {string} endpoint - The API endpoint to call (e.g., '/movie/popular').
             * @param {string} params - Additional query parameters.
             * @returns {Promise<object|null>} - The JSON response or null if an error occurs.
             */
            async function fetchFromAPI(endpoint, params = '') {
                if (!API_KEY || API_KEY === 'YOUR_TMDB_API_KEY_HERE') {
                    showError('Please enter your TMDb API key in the script.');
                    return null;
                }
                showLoader();
                try {
                    const response = await fetch(`${API_BASE_URL}${endpoint}?api_key=${API_KEY}&language=en-US${params}`);
                    if (!response.ok) {
                        throw new Error(`API Error: ${response.statusText}`);
                    }
                    const data = await response.json();
                    return data;
                } catch (error) {
                    console.error('Failed to fetch from API:', error);
                    showError('Failed to fetch data. Please check your connection or API key.');
                    return null;
                } finally {
                    hideLoader();
                }
            }

            // --- DISPLAY FUNCTIONS ---

            /**
             * Displays a list of movies or TV shows on the grid.
             * @param {Array} items - An array of movie or tv show objects from the API.
             */
            function displayItems(items) {
                moviesGrid.innerHTML = ''; // Clear previous results
                errorMessage.classList.add('hidden');

                if (!items || items.length === 0) {
                    showError('No results found.');
                    return;
                }

                items.forEach(item => {
                    // Skip items without a poster
                    if (!item.poster_path) return;

                    const posterPath = `${IMAGE_BASE_URL}${item.poster_path}`;
                    const itemEl = document.createElement('div');
                    itemEl.classList.add('item-card', 'cursor-pointer', 'group');
                    itemEl.innerHTML = `
                        <img src="${posterPath}" alt="${item.title || item.name}" 
                             class="rounded-lg poster-img w-full h-auto" 
                             onerror="this.onerror=null;this.src='${PLACEHOLDER_IMAGE}';">
                    `;
                    // Determine media_type if not present (from popular movies/tv endpoints)
                    const mediaType = item.media_type || (item.title ? 'movie' : 'tv');
                    itemEl.addEventListener('click', () => showItemDetails(item.id, mediaType));
                    moviesGrid.appendChild(itemEl);
                });
            }
            
            /**
             * Fetches and displays detailed information for a specific movie or TV show.
             * @param {number} id - The ID of the movie or TV show.
             * @param {string} type - The media type ('movie' or 'tv').
             */
            async function showItemDetails(id, type) {
                const detailsEndpoint = `/${type}/${id}`;
                const recommendationsEndpoint = `/${type}/${id}/recommendations`;

                const [details, recommendationsData] = await Promise.all([
                    fetchFromAPI(detailsEndpoint),
                    fetchFromAPI(recommendationsEndpoint)
                ]);

                if (!details) {
                    showError('Could not fetch item details.');
                    return;
                }

                const posterPath = details.poster_path ? `${IMAGE_BASE_URL}${details.poster_path}` : PLACEHOLDER_IMAGE;
                const backdropPath = details.backdrop_path ? `https://image.tmdb.org/t/p/w1280${details.backdrop_path}` : '';
                
                const title = details.title || details.name;
                const releaseDate = details.release_date || details.first_air_date;
                const year = releaseDate ? new Date(releaseDate).getFullYear() : 'N/A';
                const overview = details.overview || 'No overview available.';
                const rating = details.vote_average ? details.vote_average.toFixed(1) : 'N/A';
                
                let ratingClass = 'rating-mixed';
                if (rating >= 7) ratingClass = 'rating-fresh';
                if (rating < 5 && rating !== 'N/A') ratingClass = 'rating-rotten';

                const genres = details.genres.map(g => g.name).join(', ');

                modalBody.innerHTML = `
                    <div class="relative">
                        <img src="${backdropPath}" alt="${title} backdrop" class="w-full h-48 md:h-72 object-cover rounded-t-lg" onerror="this.style.display='none'">
                        <div class="absolute inset-0 bg-gradient-to-t from-gray-800 via-gray-800/70 to-transparent"></div>
                    </div>
                    <div class="p-6 md:p-8 relative -mt-16 md:-mt-24">
                        <div class="flex flex-col md:flex-row items-start gap-6">
                            <img src="${posterPath}" alt="${title}" class="w-32 md:w-48 rounded-lg shadow-2xl -mt-8 border-4 border-gray-700">
                            <div class="pt-4">
                                <h2 class="text-3xl font-bold text-white">${title} (${year})</h2>
                                <p class="text-gray-400 text-sm mt-1">${genres}</p>
                                <div class="flex items-center gap-4 mt-4">
                                    <div class="flex items-center gap-2">
                                        <span class="text-3xl font-bold ${ratingClass}">${rating}</span>
                                        <span class="text-gray-400">/ 10</span>
                                    </div>
                                    <p class="text-gray-400">(${details.vote_count} votes)</p>
                                </div>
                            </div>
                        </div>
                        <div class="mt-6">
                            <h3 class="text-xl font-semibold text-white mb-2">Overview</h3>
                            <p class="text-gray-300 leading-relaxed">${overview}</p>
                        </div>
                        <div id="recommendations" class="mt-8">
                            <h3 class="text-xl font-semibold text-white mb-4">You Might Also Like</h3>
                            <div id="recommendations-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                                <!-- Recommendations will be injected here -->
                            </div>
                        </div>
                    </div>
                `;

                const recommendationsGrid = document.getElementById('recommendations-grid');
                if (recommendationsData && recommendationsData.results.length > 0) {
                    // Display up to 8 recommendations
                    recommendationsData.results.slice(0, 8).forEach(rec => {
                        if (!rec.poster_path) return;
                        const recPosterPath = `${IMAGE_BASE_URL}${rec.poster_path}`;
                        const recEl = document.createElement('div');
                        recEl.classList.add('recommendation-card', 'cursor-pointer', 'group');
                        recEl.innerHTML = `
                            <img src="${recPosterPath}" alt="${rec.title || rec.name}" 
                                 class="rounded-lg poster-img w-full h-auto"
                                 onerror="this.onerror=null;this.src='${PLACEHOLDER_IMAGE}';">
                        `;
                        const recMediaType = rec.media_type || type;
                        recEl.addEventListener('click', () => {
                            closeModal();
                            // Use a timeout to allow the close animation to finish
                            setTimeout(() => showItemDetails(rec.id, recMediaType), 300);
                        });
                        recommendationsGrid.appendChild(recEl);
                    });
                } else {
                    recommendationsGrid.innerHTML = `<p class="text-gray-400 col-span-full">No recommendations found.</p>`;
                }

                openModal();
            }

            // --- UI UTILITY FUNCTIONS ---
            
            function showLoader() {
                loader.classList.remove('hidden');
            }

            function hideLoader() {
                loader.classList.add('hidden');
            }
            
            function showError(message) {
                moviesGrid.innerHTML = '';
                errorMessage.textContent = message;
                errorMessage.classList.remove('hidden');
            }

            function openModal() {
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
                modalBackdrop.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.scrollTop = 0; // Scroll modal to top
            }

            function closeModal() {
                document.body.style.overflow = 'auto';
                modalBackdrop.classList.add('opacity-0');
                modalContent.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modalBody.innerHTML = ''; // Clean up content
                }, 300); // Match transition duration
            }

            // --- EVENT LISTENERS ---

            searchForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const searchTerm = searchInput.value.trim();
                if (searchTerm) {
                    mainTitle.textContent = `Results for "${searchTerm}"`;
                    // Using multi-search to find movies and TV shows
                    const data = await fetchFromAPI(`/search/multi`, `&query=${encodeURIComponent(searchTerm)}`);
                    if (data) {
                        // Filter out people from search results
                        const mediaResults = data.results.filter(item => item.media_type === 'movie' || item.media_type === 'tv');
                        displayItems(mediaResults);
                    }
                } else {
                    // If search is cleared, show popular movies again
                    loadPopularMovies();
                }
            });

            // Close modal events
            modalClose.addEventListener('click', closeModal);
            modalBackdrop.addEventListener('click', closeModal);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                    closeModal();
                }
            });

            // --- INITIALIZATION ---
            
            /**
             * Loads popular movies on initial page load.
             */
            async function loadPopularMovies() {
                mainTitle.textContent = 'Popular Movies';
                const data = await fetchFromAPI('/movie/popular');
                if (data) {
                    displayItems(data.results);
                }
            }
            
            loadPopularMovies();
        });
    </script>
</body>
</html>
